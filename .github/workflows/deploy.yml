name: Deploy Angular no GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4
      
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Instalar dependências
        run: npm install
      
      - name: Build Angular
        run: npx ng build --configuration production --base-href=/emidio-gastronomia/
      
      - name: Descobrir pasta do build
        run: |
          if [ -d "dist/emidio-gastronomia/browser" ]; then
            echo "DEPLOY_PATH=dist/emidio-gastronomia/browser" >> $GITHUB_ENV
          else
            echo "DEPLOY_PATH=dist/emidio-gastronomia" >> $GITHUB_ENV
          fi
      
      - name: Verificar build
        run: ls -la ${{ env.DEPLOY_PATH }}
      
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      
      - name: Enviar arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DEPLOY_PATH }}
  
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar site
        id: deployment
        uses: actions/deploy-pages@v4
